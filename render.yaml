services:
  - type: web
    name: maid-recruitment-api
    env: go
    plan: standard
    region: frankfurt
    buildCommand: go build -o ./bin/api ./cmd/api
    startCommand: ./bin/api
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: GO_VERSION
        value: 1.25.8
      - key: RUN_EXPIRY_SCHEDULER
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AWS_ACCESS_KEY
        sync: false
      - key: AWS_SECRET_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  - type: cron
    name: maid-recruitment-expiry
    env: go
    plan: starter
    region: frankfurt
    schedule: "*/5 * * * *"
    buildCommand: go build -o ./bin/expiryworker ./cmd/expiryworker
    startCommand: ./bin/expiryworker
    envVars:
      - key: GO_VERSION
        value: 1.25.8
      - key: APP_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AWS_ACCESS_KEY
        sync: false
      - key: AWS_SECRET_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
