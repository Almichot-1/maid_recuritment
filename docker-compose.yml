services:
  postgres:
    image: postgres:17-alpine
    container_name: maid-recruitment-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: maid_recruitment
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - maid-network

  # Optional: pgAdmin for database management UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: maid-recruitment-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - maid-network

  # MinIO: Local S3-compatible object storage
  minio:
    image: minio/minio:latest
    container_name: maid-recruitment-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # API port
      - "9001:9001"  # Console UI port
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - maid-network

  api:
    build: .
    container_name: maid-recruitment-api
    ports:
      - "10000:10000"
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/maid_recruitment?sslmode=disable"
      JWT_SECRET: "local-dev-jwt-secret-change-in-production"
      APP_BASE_URL: "http://localhost:10000"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      AWS_ACCESS_KEY: "minioadmin"
      AWS_SECRET_KEY: "minioadmin"
      AWS_REGION: "us-east-1"
      S3_BUCKET: "maid-recruitment"
      S3_PUBLIC_BASE_URL: "http://localhost:9000/maid-recruitment"
      SMTP_HOST: "localhost"
      SMTP_PORT: "1025"
      SMTP_USER: ""
      SMTP_PASS: ""
      RUN_EXPIRY_SCHEDULER: "false"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - maid-network
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

networks:
  maid-network:
    driver: bridge
